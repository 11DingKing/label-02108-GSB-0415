<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="settingsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9CA3AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B7280;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E5E7EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9CA3AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="8" y="8" width="104" height="104" rx="22" ry="22" fill="url(#settingsGrad)"/>
  <!-- Gear shape -->
  <g transform="translate(60, 60)">
    <!-- Outer gear teeth -->
    <path d="M -8 -38 L 8 -38 L 10 -28 L -10 -28 Z" fill="url(#gearGrad)"/>
    <path d="M -8 -38 L 8 -38 L 10 -28 L -10 -28 Z" fill="url(#gearGrad)" transform="rotate(45)"/>
    <path d="M -8 -38 L 8 -38 L 10 -28 L -10 -28 Z" fill="url(#gearGrad)" transform="rotate(90)"/>
    <path d="M -8 -38 L 8 -38 L 10 -28 L -10 -28 Z" fill="url(#gearGrad)" transform="rotate(135)"/>
    <path d="M -8 -38 L 8 -38 L 10 -28 L -10 -28 Z" fill="url(#gearGrad)" transform="rotate(180)"/>
    <path d="M -8 -38 L 8 -38 L 10 -28 L -10 -28 Z" fill="url(#gearGrad)" transform="rotate(225)"/>
    <path d="M -8 -38 L 8 -38 L 10 -28 L -10 -28 Z" fill="url(#gearGrad)" transform="rotate(270)"/>
    <path d="M -8 -38 L 8 -38 L 10 -28 L -10 -28 Z" fill="url(#gearGrad)" transform="rotate(315)"/>
    <!-- Gear body -->
    <circle cx="0" cy="0" r="28" fill="url(#gearGrad)"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="12" fill="#6B7280"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="5" fill="#374151"/>
  </g>
</svg>