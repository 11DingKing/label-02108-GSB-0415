<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="notesGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FEF3C7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="8" y="8" width="104" height="104" rx="22" ry="22" fill="url(#notesGrad)"/>
  <!-- Paper background -->
  <rect x="25" y="20" width="70" height="80" rx="4" ry="4" fill="url(#paperGrad)"/>
  <!-- Paper fold corner -->
  <path d="M 75 20 L 95 20 L 95 40 Z" fill="#FDE68A"/>
  <path d="M 75 20 L 75 40 L 95 40 Z" fill="#D97706"/>
  <!-- Lines on paper -->
  <line x1="32" y1="38" x2="70" y2="38" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="50" x2="85" y2="50" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="62" x2="85" y2="62" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="74" x2="65" y2="74" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="86" x2="78" y2="86" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
</svg>