<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="finderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6EC1E4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E5E7EB;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="8" y="8" width="104" height="104" rx="22" ry="22" fill="url(#finderGrad)"/>
  <!-- Face background -->
  <rect x="25" y="25" width="70" height="70" rx="8" ry="8" fill="url(#faceGrad)"/>
  <!-- Left eye -->
  <ellipse cx="45" cy="50" rx="8" ry="10" fill="#1E3A5F"/>
  <!-- Right eye -->
  <ellipse cx="75" cy="50" rx="8" ry="10" fill="#1E3A5F"/>
  <!-- Smile -->
  <path d="M 40 70 Q 60 85 80 70" stroke="#1E3A5F" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>