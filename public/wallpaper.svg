<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Main gradient background - macOS Monterey style -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#533483;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:1" />
    </linearGradient>
    
    <!-- Radial gradient for glow effect -->
    <radialGradient id="glowPurple" cx="30%" cy="70%" r="50%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="glowPink" cx="70%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="glowOrange" cx="80%" cy="80%" r="35%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Base gradient background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Layered glow effects for depth -->
  <ellipse cx="30%" cy="70%" rx="800" ry="600" fill="url(#glowPurple)"/>
  <ellipse cx="70%" cy="30%" rx="600" ry="500" fill="url(#glowPink)"/>
  <ellipse cx="50%" cy="50%" rx="900" ry="700" fill="url(#glowBlue)"/>
  <ellipse cx="80%" cy="80%" rx="500" ry="400" fill="url(#glowOrange)"/>
  
  <!-- Additional subtle color blobs -->
  <ellipse cx="15%" cy="20%" rx="400" ry="300" fill="#6366F1" fill-opacity="0.2"/>
  <ellipse cx="85%" cy="60%" rx="350" ry="280" fill="#A855F7" fill-opacity="0.15"/>
  <ellipse cx="40%" cy="85%" rx="450" ry="350" fill="#0EA5E9" fill-opacity="0.2"/>
</svg>